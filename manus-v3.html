<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manus AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked@11.0.0/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #ffffff;
            color: #1f2937;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            padding: 12px 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .logo-icon {
            width: 20px;
            height: 20px;
            background: #8b5cf6;
            border-radius: 4px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }
        
        .header-actions {
            display: flex;
            gap: 8px;
        }
        
        .header-btn {
            background: white;
            border: 1px solid #e5e7eb;
            color: #6b7280;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .header-btn:hover {
            background: #f9fafb;
        }
        
        .container {
            flex: 1;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
        }
        
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 32px 0;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
            text-align: center;
        }
        
        .empty-state h1 {
            font-size: 32px;
            font-weight: 400;
            color: #1f2937;
            margin-bottom: 40px;
        }
        
        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .user .message-avatar {
            background: #8b5cf6;
            color: white;
        }
        
        .bot .message-avatar {
            background: #f3f4f6;
            color: #8b5cf6;
        }
        
        .message-text {
            flex: 1;
            font-size: 14px;
            line-height: 1.6;
            padding-top: 4px;
        }
        
        .thinking {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0 8px 44px;
            font-size: 13px;
            color: #6b7280;
        }
        
        .loading-msg {
            display: flex;
            gap: 12px;
        }
        
        .loading-dots {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }
        
        .loading-dot {
            width: 6px;
            height: 6px;
            background: #8b5cf6;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }
        
        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .input-area {
            padding: 20px 0 32px;
        }
        
        .input-wrapper {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        .input-wrapper:focus-within {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
        }
        
        .input-field {
            flex: 1;
            border: none;
            outline: none;
            font-size: 14px;
            resize: none;
            font-family: inherit;
        }
        
        .input-field::placeholder {
            color: #9ca3af;
        }
        
        .send-btn {
            background: #8b5cf6;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .send-btn:hover {
            background: #7c3aed;
        }
        
        .send-btn:disabled {
            background: #e5e7eb;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .action-btn {
            background: white;
            border: 1px solid #e5e7eb;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .action-btn:hover {
            background: #f9fafb;
        }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: white;
            border-radius: 12px;
            padding: 32px;
            max-width: 440px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .modal h2 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        
        .modal p {
            color: #6b7280;
            margin-bottom: 24px;
        }
        
        .modal-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        
        .modal-btn {
            width: 100%;
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .modal-btn:hover {
            background: #7c3aed;
        }
        
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: white;
            border: 1px solid #e5e7eb;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            z-index: 1001;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <div class="logo-icon">M</div>
            <span>Manus AI</span>
        </div>
        <div class="header-actions">
            <button class="header-btn" onclick="newChat()">New Chat</button>
            <button class="header-btn" onclick="showSettings()">Settings</button>
        </div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal">
            <h2>Connect to Manus AI</h2>
            <p>Enter your API key or enable mock mode</p>
            <input type="password" id="api-key" class="modal-input" placeholder="sk-...">
            <label style="display:flex;gap:8px;margin-bottom:16px;">
                <input type="checkbox" id="mock-mode" onchange="toggleMockMode()">
                <span style="font-size:13px;">Mock Mode (Demo)</span>
            </label>
            <button class="modal-btn" onclick="saveKey()">Connect</button>
        </div>
    </div>

    <div class="container">
        <div class="chat-area" id="chat">
            <div class="empty-state">
                <h1>What can I do for you?</h1>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea 
                    id="input" 
                    class="input-field" 
                    placeholder="Assign a task or ask anything"
                    rows="1"
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"
                    oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
                ></textarea>
                <button onclick="send()" id="send-btn" class="send-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
            <div class="action-buttons">
                <button class="action-btn" onclick="setInput('Create slides about ')">📄 Create slides</button>
                <button class="action-btn" onclick="setInput('Build a website for ')">🌐 Build website</button>
                <button class="action-btn" onclick="setInput('Develop an app for ')">💻 Develop app</button>
                <button class="action-btn" onclick="setInput('Design ')">🎨 Design</button>
                <button class="action-btn">More</button>
            </div>
        </div>
    </div>

    <script>
        let API_KEY = localStorage.getItem('manus_key') || '';
        let MOCK_MODE = localStorage.getItem('mock_mode') === 'true';
        let isFirstMessage = true;
        
        window.onload = () => {
            if (!API_KEY && !MOCK_MODE) document.getElementById('modal').classList.add('active');
            document.getElementById('mock-mode').checked = MOCK_MODE;
        };
        
        function showSettings() { document.getElementById('modal').classList.add('active'); }
        function newChat() {
            document.getElementById('chat').innerHTML = '<div class="empty-state"><h1>What can I do for you?</h1></div>';
            isFirstMessage = true;
        }
        
        function toggleMockMode() {
            MOCK_MODE = document.getElementById('mock-mode').checked;
            localStorage.setItem('mock_mode', MOCK_MODE);
        }
        
        function saveKey() {
            const key = document.getElementById('api-key').value.trim();
            if (!key && !MOCK_MODE) return alert('Enter API key or enable mock mode');
            if (key) { localStorage.setItem('manus_key', key); API_KEY = key; }
            document.getElementById('modal').classList.remove('active');
        }
        
        function setInput(text) { document.getElementById('input').value = text; document.getElementById('input').focus(); }
        
        function addMsg(role, text) {
            const chat = document.getElementById('chat');
            if (isFirstMessage) { chat.innerHTML = ''; isFirstMessage = false; }
            
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.innerHTML = `
                <div class="message-avatar">${role === 'user' ? 'Y' : 'M'}</div>
                <div class="message-text">${typeof marked !== 'undefined' ? marked.parse(text) : text}</div>
            `;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function addThinking(text) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'thinking';
            div.textContent = '💭 ' + text;
            chat.appendChild(div);
        }
        
        function showLoading() {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'loading-msg message bot';
            div.id = 'loading';
            div.innerHTML = `
                <div class="message-avatar">M</div>
                <div class="loading-dots">
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                </div>
            `;
            chat.appendChild(div);
            return div;
        }
        
        function extractManusData(data) {
            let output = null, thinking = [];
            if (data.output && Array.isArray(data.output)) {
                for (let item of data.output) {
                    if (item.role === 'assistant' && Array.isArray(item.content)) {
                        for (let c of item.content) {
                            if (c.type === 'output_text' && c.text) output = (output || '') + c.text;
                        }
                    }
                }
            }
            return { output, thinking, status: data.status };
        }
        
        async function send() {
            if (!API_KEY && !MOCK_MODE) { showSettings(); return; }
            
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text) return;
            
            addMsg('user', text);
            input.value = '';
            input.style.height = 'auto';
            input.disabled = true;
            document.getElementById('send-btn').disabled = true;
            
            const loading = showLoading();
            
            try {
                if (MOCK_MODE) {
                    await new Promise(r => setTimeout(r, 1000));
                    loading.remove();
                    addMsg('bot', 'Hello! I\'m in mock mode. Disable it to use real Manus AI.');
                } else {
                    const res = await fetch('https://manus-proxy-dxaj.onrender.com/api/proxy', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
                        body: JSON.stringify({ prompt: text })
                    });
                    
                    const { task_id } = await res.json();
                    if (!task_id) throw new Error('No task ID');
                    
                    let attempts = 0, found = false;
                    while (attempts++ < 60 && !found) {
                        await new Promise(r => setTimeout(r, 3000));
                        const statusRes = await fetch(`https://manus-proxy-dxaj.onrender.com/api/task-status/${task_id}`, {
                            headers: { 'x-api-key': API_KEY }
                        });
                        if (!statusRes.ok) continue;
                        
                        const data = await statusRes.json();
                        const { output, thinking, status } = extractManusData(data);
                        
                        thinking.forEach(t => addThinking(t));
                        
                        if (output) {
                            loading.remove();
                            addMsg('bot', output);
                            found = true;
                            break;
                        }
                        
                        if (status === 'completed' || status === 'failed') break;
                    }
                    
                    if (!found) loading.remove();
                }
            } catch (err) {
                loading.remove();
                alert('Error: ' + err.message);
            } finally {
                input.disabled = false;
                document.getElementById('send-btn').disabled = false;
            }
        }
    </script>
</body>
</html>
