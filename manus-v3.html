<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manus AI - Debug Mode</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.12);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 85vh;
        }
        .header {
            background: #dc3545; /* Red for debug */
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }
        .header-title { font-size: 1.2rem; }
        .header-btns { display: flex; gap: 10px; }
        .header-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 75%;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 15px;
        }
        .user { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bot { background: #e9ecef; color: #1c1e21; align-self: flex-start; border-bottom-left-radius: 4px; white-space: pre-wrap; }
        
        .debug-log {
            background: #212529;
            color: #00ff00;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #dee2e6;
            display: flex;
            gap: 12px;
        }
        input { flex: 1; padding: 12px 16px; border: 1px solid #ced4da; border-radius: 24px; font-size: 15px; outline: none; }
        button#send-btn { padding: 10px 24px; background: #dc3545; color: white; border: none; border-radius: 24px; font-weight: 600; cursor: pointer; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .api-setup { background: #fff3cd; padding: 15px; text-align: center; border-bottom: 1px solid #ffeeba; display: none; }
        .api-setup input { margin: 10px; max-width: 300px; }
        .api-setup button { padding: 8px 20px; background: #856404; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">Manus AI - DEBUG MODE</div>
            <div class="header-btns">
                <button class="header-btn" onclick="resetKey()">Change API Key</button>
            </div>
        </div>
        
        <div id="api-setup" class="api-setup">
            <strong>🔑 API Key Required:</strong>
            <input type="password" id="api-key" placeholder="Paste your Manus API key here...">
            <button onclick="saveKey()">Save Key</button>
        </div>
        
        <div class="chat-area" id="chat">
            <div class="message bot">DEBUG MODE: I will show the raw server response below each message.</div>
        </div>
        
        <div id="debug-output" class="debug-log">Waiting for data...</div>
        
        <div class="input-area">
            <input type="text" id="input" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" id="send-btn">Send</button>
        </div>
    </div>

    <script>
        let API_KEY = localStorage.getItem('manus_key') || '';
        const setupBox = document.getElementById('api-setup');
        const debugOutput = document.getElementById('debug-output');
        
        if (!API_KEY) setupBox.style.display = 'block';
        
        function logDebug(obj) {
            debugOutput.textContent = "RAW DATA FROM SERVER:\n" + JSON.stringify(obj, null, 2);
            console.log("DEBUG:", obj);
        }

        function saveKey() {
            const key = document.getElementById('api-key').value.trim();
            if (!key) return alert('Please enter a valid key!');
            localStorage.setItem('manus_key', key);
            API_KEY = key;
            setupBox.style.display = 'none';
            addMsg('bot', '✅ API Key saved!');
        }

        function resetKey() {
            localStorage.removeItem('manus_key');
            API_KEY = '';
            setupBox.style.display = 'block';
            addMsg('bot', '⚠️ API Key cleared.');
        }
        
        function addMsg(role, text) {
            const chat = document.getElementById('chat');
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.textContent = text;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
            return msg;
        }
        
        async function send() {
            if (!API_KEY) return alert('Please save your API key first!');
            
            const input = document.getElementById('input');
            const btn = document.getElementById('send-btn');
            const userText = input.value.trim();
            
            if (!userText) return;
            
            addMsg('user', userText);
            input.value = '';
            input.disabled = true;
            btn.disabled = true;
            
            const loadingMsg = addMsg('bot', 'Thinking...');
            
            try {
                const createRes = await fetch('https://manus-proxy-dxaj.onrender.com/api/proxy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
                    body: JSON.stringify({ prompt: userText })
                });
                
                const createData = await createRes.json();
                logDebug(createData);
                
                if (!createData.task_id) throw new Error('No Task ID returned');
                
                let attempts = 0;
                while (attempts < 60) {
                    await new Promise(r => setTimeout(r, 3000));
                    attempts++;
                    loadingMsg.textContent = `Polling... (${attempts * 3}s)`;
                    
                    const statusRes = await fetch(`https://manus-proxy-dxaj.onrender.com/api/task-status/${createData.task_id}`, {
                        headers: { 'x-api-key': API_KEY }
                    });
                    
                    const statusData = await statusRes.json();
                    logDebug(statusData);
                    
                    // EXTRACTION LOGIC
                    let text = '';
                    
                    // 1. Check if it's the full task object (from server.js line 112)
                    if (statusData && statusData.status === 'completed' && statusData.output) {
                        text = statusData.output.text || statusData.output;
                    }
                    
                    // 2. Check if it's the array format
                    if (!text && Array.isArray(statusData)) {
                        const assistantMsgs = statusData.filter(m => m.role === 'assistant' && m.status === 'completed');
                        if (assistantMsgs.length > 0) {
                            const lastMsg = assistantMsgs[assistantMsgs.length - 1];
                            if (lastMsg.content && Array.isArray(lastMsg.content)) {
                                text = lastMsg.content.filter(item => item.text).map(item => item.text).join('\n\n');
                            }
                        }
                    }
                    
                    if (text) {
                        loadingMsg.textContent = text;
                        return;
                    }
                }
                throw new Error('Timed out');
            } catch (err) {
                loadingMsg.textContent = `❌ Error: ${err.message}`;
            } finally {
                input.disabled = false;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
