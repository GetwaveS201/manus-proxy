<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manus AI - Simple</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
        }
        .bot {
            background: white;
            border: 1px solid #ddd;
        }
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .api-setup {
            background: #ffeaa7;
            padding: 15px;
            text-align: center;
        }
        .api-setup input {
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Manus AI</h1>
        </div>
        
        <div id="api-setup" class="api-setup">
            <strong>⚠️ Enter your Manus API Key:</strong><br>
            <input type="password" id="api-key" placeholder="Your API key...">
            <button onclick="saveKey()">Save</button>
        </div>
        
        <div class="chat-area" id="chat"></div>
        
        <div class="input-area">
            <input type="text" id="input" placeholder="Type a message..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" id="send-btn">Send</button>
        </div>
    </div>

    <script>
        let API_KEY = localStorage.getItem('manus_key') || '';
        
        if (API_KEY) {
            document.getElementById('api-setup').style.display = 'none';
        }
        
        function saveKey() {
            const key = document.getElementById('api-key').value.trim();
            if (!key) return alert('Enter a key!');
            localStorage.setItem('manus_key', key);
            API_KEY = key;
            document.getElementById('api-setup').style.display = 'none';
            addMsg('bot', '✓ Key saved! Send a message to test.');
        }
        
        function addMsg(role, text) {
            const chat = document.getElementById('chat');
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.textContent = text;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
            return msg;
        }
        
        async function send() {
            if (!API_KEY) return alert('Save your API key first!');
            
            const input = document.getElementById('input');
            const btn = document.getElementById('send-btn');
            const msg = input.value.trim();
            
            if (!msg) return;
            
            addMsg('user', msg);
            input.value = '';
            input.disabled = true;
            btn.disabled = true;
            
            const loading = addMsg('bot', 'Thinking...');
            
            try {
                // Create task
                const res1 = await fetch('https://manus-proxy-dxaj.onrender.com/api/proxy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY
                    },
                    body: JSON.stringify({ prompt: msg })
                });
                
                const data1 = await res1.json();
                console.log('Task created:', data1);
                
                if (!data1.task_id) {
                    throw new Error('No task ID: ' + JSON.stringify(data1));
                }
                
                // Poll for result (simplified - just wait and check)
                loading.textContent = 'Processing...';
                
                let attempts = 0;
                while (attempts < 90) {
                    await new Promise(r => setTimeout(r, 2000));
                    attempts++;
                    loading.textContent = `Processing... (${attempts * 2}s)`;
                    
                    try {
                        const res2 = await fetch(
                            `https://manus-proxy-dxaj.onrender.com/api/task-status/${data1.task_id}`,
                            { headers: { 'x-api-key': API_KEY } }
                        );
                        
                        const data2 = await res2.json();
                        console.log('Poll response:', data2);
                        
                        // SIMPLE: Just look for ANY text in the response
                        let reply = '';
                        
                        // Try to find text in array format
                        if (Array.isArray(data2)) {
                            for (let item of data2) {
                                if (item.role === 'assistant' && item.content) {
                                    for (let c of item.content) {
                                        if (c.text) {
                                            reply = c.text;
                                            break;
                                        }
                                    }
                                }
                                if (reply) break;
                            }
                        }
                        
                        // Show whatever we found
                        if (reply) {
                            loading.textContent = reply;
                            input.disabled = false;
                            btn.disabled = false;
                            return;
                        }
                        
                    } catch (e) {
                        console.error('Poll error:', e);
                    }
                }
                
                throw new Error('Timed out after 3 minutes');
                
            } catch (error) {
                loading.textContent = `Error: ${error.message}`;
                console.error(error);
            }
            
            input.disabled = false;
            btn.disabled = false;
        }
    </script>
</body>
</html>
