<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manus AI - Professional Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.12);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 85vh;
        }
        .header {
            background: #007bff;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }
        .header-title { font-size: 1.2rem; }
        .header-btns { display: flex; gap: 10px; }
        .header-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .header-btn:hover { background: white; color: #007bff; }
        
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 75%;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 15px;
            position: relative;
        }
        .user {
            background: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot {
            background: #e9ecef;
            color: #1c1e21;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            white-space: pre-wrap;
        }
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #dee2e6;
            display: flex;
            gap: 12px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ced4da;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
        }
        button#send-btn {
            padding: 10px 24px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .api-setup {
            background: #fff3cd;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #ffeeba;
            display: none;
        }
        .api-setup input {
            margin: 10px;
            max-width: 300px;
        }
        .api-setup button {
            padding: 8px 20px;
            background: #856404;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .status-tag {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">Manus AI Assistant</div>
            <div class="header-btns">
                <button class="header-btn" onclick="resetKey()">Change API Key</button>
            </div>
        </div>
        
        <div id="api-setup" class="api-setup">
            <strong>🔑 API Key Required:</strong>
            <input type="password" id="api-key" placeholder="Paste your Manus API key here...">
            <button onclick="saveKey()">Save Key</button>
        </div>
        
        <div class="chat-area" id="chat">
            <div class="message bot">Hello! I'm your Manus AI assistant.</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="input" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" id="send-btn">Send</button>
        </div>
    </div>

    <script>
        let API_KEY = localStorage.getItem('manus_key') || '';
        const setupBox = document.getElementById('api-setup');
        let currentTaskId = null;
        let isPolling = false;
        
        if (!API_KEY) {
            setupBox.style.display = 'block';
        }
        
        function saveKey() {
            const key = document.getElementById('api-key').value.trim();
            if (!key) return alert('Please enter a valid key!');
            localStorage.setItem('manus_key', key);
            API_KEY = key;
            setupBox.style.display = 'none';
            addMsg('bot', '✅ API Key saved! You can now start chatting.');
        }

        function resetKey() {
            if (confirm('Do you want to change your API key?')) {
                localStorage.removeItem('manus_key');
                API_KEY = '';
                setupBox.style.display = 'block';
                document.getElementById('api-key').value = '';
                addMsg('bot', '⚠️ API Key cleared. Please enter a new one above.');
            }
        }
        
        function addMsg(role, text) {
            const chat = document.getElementById('chat');
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.textContent = text;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
            return msg;
        }
        
        async function checkStatus(taskId, loadingMsg) {
            try {
                const statusRes = await fetch(`https://manus-proxy-dxaj.onrender.com/api/task-status/${taskId}`, {
                    headers: { 'x-api-key': API_KEY }
                });
                
                const statusData = await statusRes.json();
                console.log("Status Check:", statusData);
                
                if (Array.isArray(statusData)) {
                    // Strategy: Look for the last assistant message that is NOT empty
                    const assistantMsgs = statusData.filter(m => m.role === 'assistant');
                    
                    if (assistantMsgs.length > 0) {
                        const lastMsg = assistantMsgs[assistantMsgs.length - 1];
                        
                        // If it's completed and has content, we're done
                        if (lastMsg.status === 'completed' && lastMsg.content && Array.isArray(lastMsg.content)) {
                            const text = lastMsg.content
                                .filter(item => item.text !== undefined)
                                .map(item => item.text)
                                .join('\n\n');
                            
                            if (text.trim()) {
                                loadingMsg.textContent = text;
                                return true; // Success
                            }
                        }
                    }
                }
            } catch (err) {
                console.error("Poll error:", err);
            }
            return false;
        }

        async function send() {
            if (!API_KEY) {
                setupBox.style.display = 'block';
                return alert('Please save your API key first!');
            }
            
            const input = document.getElementById('input');
            const btn = document.getElementById('send-btn');
            const userText = input.value.trim();
            
            if (!userText || isPolling) return;
            
            addMsg('user', userText);
            input.value = '';
            input.disabled = true;
            btn.disabled = true;
            
            const loadingMsg = addMsg('bot', 'Thinking...');
            isPolling = true;
            
            try {
                const createRes = await fetch('https://manus-proxy-dxaj.onrender.com/api/proxy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
                    body: JSON.stringify({ prompt: userText })
                });
                
                const createData = await createRes.json();
                if (!createData.task_id) throw new Error('Invalid API Key or Server Error');
                
                currentTaskId = createData.task_id;
                console.log("Task ID:", currentTaskId);
                
                let attempts = 0;
                const maxAttempts = 150; // 5 minutes (2s intervals)
                
                while (attempts < maxAttempts) {
                    await new Promise(r => setTimeout(r, 2000));
                    attempts++;
                    loadingMsg.textContent = `Processing... (${attempts * 2}s)`;
                    
                    const finished = await checkStatus(currentTaskId, loadingMsg);
                    if (finished) {
                        isPolling = false;
                        input.disabled = false;
                        btn.disabled = false;
                        return;
                    }
                }
                throw new Error('Timed out after 5 minutes. Manus might still be working, try sending another message in a moment.');
            } catch (err) {
                loadingMsg.textContent = `❌ Error: ${err.message}`;
            } finally {
                isPolling = false;
                input.disabled = false;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
