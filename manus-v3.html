<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manus AI - Professional Chat</title>
    <style>
        /* 
           Senior Developer Note: 
           I've kept the styling clean and professional. 
           The layout is responsive and works on mobile too.
        */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.12);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 85vh;
        }
        .header {
            background: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 75%;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 15px;
        }
        .user {
            background: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot {
            background: #e9ecef;
            color: #1c1e21;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            white-space: pre-wrap;
        }
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #dee2e6;
            display: flex;
            gap: 12px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ced4da;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #007bff; }
        button {
            padding: 10px 24px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .api-setup {
            background: #fff3cd;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #ffeeba;
        }
        .api-setup input {
            margin: 10px;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Manus AI Assistant</div>
        
        <!-- API Key Setup Section -->
        <div id="api-setup" class="api-setup">
            <strong>🔑 API Key Required:</strong>
            <input type="password" id="api-key" placeholder="Paste your Manus API key here...">
            <button onclick="saveKey()">Save Key</button>
        </div>
        
        <div class="chat-area" id="chat">
            <div class="message bot">Hello! I'm your Manus AI assistant. Please save your API key above to start chatting.</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="input" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" id="send-btn">Send</button>
        </div>
    </div>

    <script>
        /**
         * SENIOR DEVELOPER NOTES:
         * 1. The core issue was the strictness of the JSON parsing.
         * 2. I've implemented a "Flexible Extraction" strategy that looks for text 
         *    regardless of whether the 'type' field is present.
         * 3. Added comprehensive logging so you can see the data flow in the Console (F12).
         */

        let API_KEY = localStorage.getItem('manus_key') || '';
        
        // Hide setup if key exists
        if (API_KEY) {
            document.getElementById('api-setup').style.display = 'none';
        }
        
        function saveKey() {
            const key = document.getElementById('api-key').value.trim();
            if (!key) return alert('Please enter a valid key!');
            localStorage.setItem('manus_key', key);
            API_KEY = key;
            document.getElementById('api-setup').style.display = 'none';
            addMsg('bot', '✅ API Key saved successfully! How can I help you today?');
        }
        
        function addMsg(role, text) {
            const chat = document.getElementById('chat');
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.textContent = text;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
            return msg;
        }
        
        async function send() {
            if (!API_KEY) return alert('Please save your API key first!');
            
            const input = document.getElementById('input');
            const btn = document.getElementById('send-btn');
            const userText = input.value.trim();
            
            if (!userText) return;
            
            // 1. Update UI
            addMsg('user', userText);
            input.value = '';
            input.disabled = true;
            btn.disabled = true;
            
            const loadingMsg = addMsg('bot', 'Thinking...');
            
            try {
                // 2. Create Task via Proxy
                console.log('--- STARTING NEW TASK ---');
                const createRes = await fetch('https://manus-proxy-dxaj.onrender.com/api/proxy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY
                    },
                    body: JSON.stringify({ prompt: userText })
                });
                
                const createData = await createRes.json();
                console.log('Task Created:', createData);
                
                if (!createData.task_id) {
                    throw new Error('Server failed to provide a Task ID. Check your API key.');
                }
                
                // 3. Polling Loop
                let attempts = 0;
                const maxAttempts = 60; // 2 minutes (2s intervals)
                
                while (attempts < maxAttempts) {
                    await new Promise(r => setTimeout(r, 2000));
                    attempts++;
                    loadingMsg.textContent = `Processing... (${attempts * 2}s)`;
                    
                    try {
                        const statusRes = await fetch(
                            `https://manus-proxy-dxaj.onrender.com/api/task-status/${createData.task_id}`,
                            { headers: { 'x-api-key': API_KEY } }
                        );
                        
                        const statusData = await statusRes.json();
                        console.log(`Poll #${attempts} Data:`, statusData);
                        
                        // --- ROBUST EXTRACTION LOGIC ---
                        let extractedText = '';
                        
                        if (Array.isArray(statusData)) {
                            // Find all completed assistant messages
                            const assistantMsgs = statusData.filter(m => 
                                m.role === 'assistant' && m.status === 'completed'
                            );
                            
                            if (assistantMsgs.length > 0) {
                                // Get the very last one
                                const lastMsg = assistantMsgs[assistantMsgs.length - 1];
                                
                                if (lastMsg.content && Array.isArray(lastMsg.content)) {
                                    // Extract text from all content items that have a 'text' property
                                    const textParts = lastMsg.content
                                        .filter(item => item.text !== undefined)
                                        .map(item => item.text);
                                    
                                    extractedText = textParts.join('\n\n');
                                }
                            }
                        }
                        
                        // 4. If we found text, display it and stop
                        if (extractedText) {
                            console.log('Success! Extracted:', extractedText);
                            loadingMsg.textContent = extractedText;
                            input.disabled = false;
                            btn.disabled = false;
                            return; 
                        }
                        
                    } catch (pollErr) {
                        console.warn('Polling error (retrying):', pollErr);
                    }
                }
                
                throw new Error('The request timed out. The AI might still be working, but the app stopped waiting.');
                
            } catch (err) {
                console.error('Final Error:', err);
                loadingMsg.textContent = `❌ Error: ${err.message}`;
            } finally {
                input.disabled = false;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
