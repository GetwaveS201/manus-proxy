<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manus AI - Terminal Interface</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', Courier, monospace;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 1000px;
            background: #161b22;
            border-radius: 8px;
            border: 1px solid #30363d;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }
        .header {
            background: #21262d;
            color: #f0f6fc;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
        }
        .header-title { font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }
        
        .header-btn {
            background: transparent;
            color: #8b949e;
            border: 1px solid #30363d;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
        }
        .header-btn:hover { color: #f0f6fc; border-color: #8b949e; }
        
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #0d1117;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            padding: 5px 0;
            line-height: 1.4;
            font-size: 14px;
            white-space: pre-wrap;
        }
        .user { color: #58a6ff; }
        .user::before { content: "> "; }
        .bot { color: #c9d1d9; }
        .thinking { color: #8b949e; font-style: italic; font-size: 12px; border-left: 2px solid #30363d; padding-left: 10px; margin: 5px 0; }
        .system { color: #8b949e; font-style: italic; }
        
        .input-area {
            padding: 15px 20px;
            background: #161b22;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .prompt-symbol { color: #58a6ff; font-weight: bold; }
        input {
            flex: 1;
            background: transparent;
            border: none;
            color: #f0f6fc;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        button#send-btn {
            background: #238636;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }
        button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        
        .api-setup {
            background: #382a00;
            color: #ffea7f;
            padding: 10px 20px;
            text-align: center;
            border-bottom: 1px solid #30363d;
            display: none;
        }
        .api-setup input {
            background: #0d1117;
            border: 1px solid #30363d;
            padding: 5px 10px;
            margin: 0 10px;
            border-radius: 4px;
            width: 250px;
        }
        .api-setup button {
            background: #ffea7f;
            color: #382a00;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <div class="dot dot-red"></div>
                <div class="dot dot-yellow"></div>
                <div class="dot dot-green"></div>
                <span>manus-terminal — bash</span>
            </div>
            <button class="header-btn" onclick="resetKey()">RESET_API_KEY</button>
        </div>
        
        <div id="api-setup" class="api-setup">
            [SYSTEM] API_KEY_REQUIRED: 
            <input type="password" id="api-key" placeholder="enter_key_here">
            <button onclick="saveKey()">SAVE</button>
        </div>
        
        <div class="chat-area" id="chat">
            <div class="message system">Manus Terminal v1.2.0 initialized.</div>
            <div class="message system">Listening for Manus AI output...</div>
        </div>
        
        <div class="input-area">
            <span class="prompt-symbol">user@manus:~$</span>
            <input type="text" id="input" placeholder="type_command..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" id="send-btn">EXEC</button>
        </div>
    </div>

    <script>
        /**
         * MANUS-STYLE TERMINAL FIX:
         * This version is specifically designed to capture the "Thinking process"
         * and the final output as seen in the official Manus app.
         */

        let API_KEY = localStorage.getItem('manus_key') || '';
        const setupBox = document.getElementById('api-setup');
        
        if (!API_KEY) setupBox.style.display = 'block';
        
        function saveKey() {
            const key = document.getElementById('api-key').value.trim();
            if (!key) return;
            localStorage.setItem('manus_key', key);
            API_KEY = key;
            setupBox.style.display = 'none';
            addMsg('system', 'API_KEY_SAVED: Connection established.');
        }

        function resetKey() {
            localStorage.removeItem('manus_key');
            API_KEY = '';
            setupBox.style.display = 'block';
            addMsg('system', 'API_KEY_CLEARED: Enter new key.');
        }
        
        function addMsg(role, text) {
            const chat = document.getElementById('chat');
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.textContent = text;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
            return msg;
        }

        // THE MANUS EXTRACTOR: Captures thinking and final output
        function processManusData(data) {
            let results = { thinking: [], output: null };

            if (!data) return results;

            // 1. Check for 'steps' or 'thinking' (common in agent tasks)
            if (data.steps && Array.isArray(data.steps)) {
                results.thinking = data.steps.map(s => s.thought || s.text).filter(Boolean);
            }

            // 2. Check for the final output
            if (data.output) {
                if (typeof data.output === 'string') results.output = data.output;
                else if (data.output.text) results.output = data.output.text;
            }

            // 3. If it's an array of messages (standard chat format)
            if (Array.isArray(data)) {
                const assistantMsgs = data.filter(m => m.role === 'assistant');
                for (let msg of assistantMsgs) {
                    // Extract thinking from content if it exists
                    if (msg.content && Array.isArray(msg.content)) {
                        const thinkingParts = msg.content.filter(c => c.type === 'thinking').map(c => c.text);
                        results.thinking.push(...thinkingParts);
                        
                        const outputParts = msg.content.filter(c => c.type === 'text' || c.type === 'output_text').map(c => c.text);
                        if (outputParts.length > 0) results.output = outputParts.join('\n');
                    }
                    
                    // If it's just a completed message with text
                    if (msg.status === 'completed' && !results.output) {
                        if (typeof msg.content === 'string') results.output = msg.content;
                        else if (msg.content && msg.content.text) results.output = msg.content.text;
                    }
                }
            }

            return results;
        }
        
        async function send() {
            if (!API_KEY) return;
            
            const input = document.getElementById('input');
            const btn = document.getElementById('send-btn');
            const userText = input.value.trim();
            
            if (!userText) return;
            
            addMsg('user', userText);
            input.value = '';
            input.disabled = true;
            btn.disabled = true;
            
            const loadingMsg = addMsg('bot', '[INITIALIZING_AGENT...]');
            let thinkingMsg = null;
            
            try {
                const createRes = await fetch('https://manus-proxy-dxaj.onrender.com/api/proxy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
                    body: JSON.stringify({ prompt: userText })
                });
                
                const createData = await createRes.json();
                if (!createData.task_id) throw new Error('AGENT_START_FAILED');
                
                let attempts = 0;
                let lastThinkingCount = 0;

                while (attempts < 120) {
                    await new Promise(r => setTimeout(r, 3000));
                    attempts++;
                    
                    const statusRes = await fetch(`https://manus-proxy-dxaj.onrender.com/api/task-status/${createData.task_id}`, {
                        headers: { 'x-api-key': API_KEY }
                    });
                    
                    const statusData = await statusRes.json();
                    const processed = processManusData(statusData);
                    
                    // Update Thinking Process
                    if (processed.thinking.length > lastThinkingCount) {
                        for (let i = lastThinkingCount; i < processed.thinking.length; i++) {
                            addMsg('thinking', `[THOUGHT]: ${processed.thinking[i]}`);
                        }
                        lastThinkingCount = processed.thinking.length;
                    }

                    // Update Final Output
                    if (processed.output) {
                        loadingMsg.textContent = processed.output;
                        if (statusData.status === 'completed') return;
                    } else {
                        loadingMsg.textContent = `[AGENT_WORKING... ${attempts * 3}s]`;
                    }
                    
                    if (statusData.status === 'completed' && !processed.output) {
                        // Final fallback: just show the raw data if we still have nothing
                        loadingMsg.textContent = "[TASK_COMPLETE_CHECK_CONSOLE]";
                        console.log("Final Data:", statusData);
                        return;
                    }
                }
                throw new Error('TIMEOUT');
            } catch (err) {
                loadingMsg.textContent = `[ERROR]: ${err.message}`;
            } finally {
                input.disabled = false;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
