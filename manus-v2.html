<!DOCTYPE html>
<html>
<head>
    <title>Manus AI V2</title>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            max-width: 600px; 
            margin: 0 auto; 
            background: #f5f5f5;
        }
        #chat { 
            height: 400px; 
            border: 1px solid #ccc; 
            overflow-y: auto; 
            padding: 10px; 
            margin-bottom: 10px; 
            background: white;
            border-radius: 8px;
        }
        .msg { 
            margin: 8px 0; 
            padding: 10px; 
            border-radius: 8px; 
            max-width: 80%;
            word-wrap: break-word;
        }
        .user { 
            background: #007bff; 
            color: white; 
            margin-left: auto;
            text-align: right;
        }
        .bot { 
            background: #eee; 
        }
        .error {
            background: #ffebee;
            color: #c62828;
        }
        #api-setup {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #ffc107;
        }
        #api-setup.hidden { display: none; }
        input[type="text"], input[type="password"] { 
            width: 70%; 
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button { 
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #218838; }
        button:disabled { 
            background: #ccc;
            cursor: not-allowed;
        }
        .status {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <h3>Manus AI - Version 2.0</h3>
    
    <div id="api-setup">
        <strong>⚠️ Setup Required:</strong><br>
        <label>Your Manus API Key:</label><br>
        <input type="password" id="api-key-input" placeholder="Enter your API key">
        <button onclick="saveApiKey()">Save</button>
        <div class="status" id="api-status"></div>
    </div>
    
    <div id="chat"></div>
    <input type="text" id="input" placeholder="Type your message..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()" id="send-btn">Send</button>
    <button onclick="clearChat()" style="background: #dc3545">Clear</button>
    
    <div class="status" id="status-text"></div>
    
    <script>
        let API_KEY = localStorage.getItem('manus_api_key') || '';
        
        // Check if API key exists on load
        if (API_KEY) {
            document.getElementById('api-setup').classList.add('hidden');
            document.getElementById('api-status').innerText = '✓ API Key saved';
        }
        
        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (!key) {
                alert('Please enter an API key');
                return;
            }
            localStorage.setItem('manus_api_key', key);
            API_KEY = key;
            document.getElementById('api-setup').classList.add('hidden');
            document.getElementById('api-status').innerText = '✓ API Key saved';
            addBotMessage('API key saved! You can now chat with Manus.');
        }
        
        function addUserMessage(text) {
            const box = document.getElementById('chat');
            const msg = document.createElement('div');
            msg.className = 'msg user';
            msg.innerText = text;
            box.appendChild(msg);
            box.scrollTop = box.scrollHeight;
        }
        
        function addBotMessage(text, isError = false) {
            const box = document.getElementById('chat');
            const msg = document.createElement('div');
            msg.className = 'msg bot' + (isError ? ' error' : '');
            msg.innerText = text;
            box.appendChild(msg);
            box.scrollTop = box.scrollHeight;
            return msg;
        }
        
        function updateStatus(text) {
            document.getElementById('status-text').innerText = text;
        }
        
        function clearChat() {
            document.getElementById('chat').innerHTML = '';
        }
        
        async function send() {
            if (!API_KEY) {
                alert('Please save your API key first!');
                return;
            }
            
            const input = document.getElementById('input');
            const val = input.value.trim();
            if (!val) return;
            
            // Disable input while processing
            const sendBtn = document.getElementById('send-btn');
            input.disabled = true;
            sendBtn.disabled = true;
            
            addUserMessage(val);
            input.value = '';
            
            const loadingMsg = addBotMessage('Creating task...');
            updateStatus('Sending to Manus AI...');
            
            try {
                // Step 1: Create task
                const createRes = await fetch('https://manus-proxy-dxaj.onrender.com/api/proxy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY
                    },
                    body: JSON.stringify({ prompt: val })
                });
                
                if (!createRes.ok) {
                    throw new Error(`Server error: ${createRes.status}`);
                }
                
                const createData = await createRes.json();
                
                if (!createData.task_id) {
                    throw new Error('No task_id received: ' + JSON.stringify(createData));
                }
                
                const taskId = createData.task_id;
                loadingMsg.innerText = 'Task created! Waiting for response...';
                updateStatus(`Task ID: ${taskId}`);
                
                // Step 2: Poll for result
                let attempts = 0;
                const maxAttempts = 60; // 60 attempts × 2 seconds = 120 seconds
                
                while (attempts < maxAttempts) {
                    await new Promise(resolve => setTimeout(resolve, 2000)); // Wait 2 seconds
                    
                    updateStatus(`Checking result... (${attempts * 2}s)`);
                    loadingMsg.innerText = `Processing... (${attempts * 2}s)`;
                    
                    try {
                        const statusRes = await fetch(
                            `https://manus-proxy-dxaj.onrender.com/api/task-status/${taskId}`,
                            {
                                method: 'GET',
                                headers: { 'x-api-key': API_KEY }
                            }
                        );
                        
                        if (!statusRes.ok) {
                            attempts++;
                            continue;
                        }
                        
                        const statusData = await statusRes.json();
                        
                        // Check if completed
                        if (statusData.status === 'completed') {
                            // THE CRITICAL FIX: Extract text from content array
                            let reply = '';
                            
                            if (statusData.content && Array.isArray(statusData.content)) {
                                // Filter for output_text items and extract text
                                reply = statusData.content
                                    .filter(item => item.type === 'output_text')
                                    .map(item => item.text)
                                    .join('\n\n');
                            }
                            
                            if (!reply) {
                                // Fallback: try other possible fields
                                reply = statusData.result || statusData.output || 
                                       'Response received but no text found. Raw: ' + JSON.stringify(statusData);
                            }
                            
                            loadingMsg.innerText = reply;
                            updateStatus('✓ Complete');
                            
                            // Re-enable input
                            input.disabled = false;
                            sendBtn.disabled = false;
                            input.focus();
                            return;
                        }
                        
                        // Check if failed
                        if (statusData.status === 'failed') {
                            throw new Error('Task failed: ' + (statusData.error || 'Unknown error'));
                        }
                        
                        // Still pending, continue polling
                        attempts++;
                        
                    } catch (pollError) {
                        console.error('Poll error:', pollError);
                        attempts++;
                        if (attempts >= maxAttempts) {
                            throw pollError;
                        }
                    }
                }
                
                // Timeout
                throw new Error('Task timed out after 120 seconds');
                
            } catch (error) {
                console.error('Full error:', error);
                loadingMsg.innerText = `Error: ${error.message}`;
                loadingMsg.className = 'msg bot error';
                updateStatus('❌ Error occurred');
                
                // Show helpful error messages
                if (error.message.includes('Failed to fetch')) {
                    addBotMessage('Network error. Check your internet connection or try again.', true);
                } else if (error.message.includes('401')) {
                    addBotMessage('Invalid API key. Please check your key in settings.', true);
                } else if (error.message.includes('timed out')) {
                    addBotMessage('The request took too long. The server might be sleeping (Render free tier). Try again in a minute.', true);
                }
            }
            
            // Re-enable input
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
        }
        
        // Add welcome message
        window.onload = function() {
            if (API_KEY) {
                addBotMessage('👋 Hello! I\'m Manus AI. How can I help you today?');
            }
        };
    </script>
</body>
</html>
